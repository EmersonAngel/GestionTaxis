services:
  postgres:
    image: postgres:16-alpine
    container_name: taxis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taxi_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: taxis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taxi_fleet
      MYSQL_USER: taxi
      MYSQL_PASSWORD: taxi
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./backend/auth-service
    container_name: taxis-auth-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taxi_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  taxi-service:
    build: ./backend/taxi-service
    container_name: taxis-taxi-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taxi_fleet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: taxi
      SPRING_DATASOURCE_PASSWORD: taxi
      JWT_SECRET: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy

  trip-service:
    build: ./backend/trip-service
    container_name: taxis-trip-service
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taxi_trips
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: taxis-frontend
    ports:
      - "4300:80"
    depends_on:
      - auth-service
      - taxi-service
      - trip-service

volumes:
  postgres_data:
  mysql_data:
