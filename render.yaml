# Render Blueprint para desplegar el backend de Gestion de Taxis.
# Nota: Render ofrece PostgreSQL administrado, pero no MySQL administrado.
# Por eso MySQL se define como un servicio privado Docker con disco persistente.
# Ese servicio privado usa plan "starter" porque Render no permite plan free para private services.

databases:
  - name: taxis-auth-db
    plan: free
    databaseName: taxi_auth
    user: taxi_auth_user
    postgresMajorVersion: "16"

  - name: taxis-trips-db
    plan: free
    databaseName: taxi_trips
    user: taxi_trips_user
    postgresMajorVersion: "16"

services:
  - type: pserv
    name: taxis-mysql
    runtime: image
    plan: starter
    image:
      url: docker.io/library/mysql:8.4
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_DATABASE
        value: taxi_fleet
      - key: MYSQL_USER
        value: taxi
      - key: MYSQL_PASSWORD
        value: taxi

  - type: web
    name: taxis-auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/auth-service/Dockerfile
    dockerContext: ./backend/auth-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: taxis-auth-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: taxis-auth-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: taxis-auth-db
          property: password
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987

  - type: web
    name: taxis-taxi-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/taxi-service/Dockerfile
    dockerContext: ./backend/taxi-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: MYSQL_HOST
        fromService:
          type: pserv
          name: taxis-mysql
          property: host
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_DATABASE
        value: taxi_fleet
      - key: MYSQL_USER
        value: taxi
      - key: MYSQL_PASSWORD
        value: taxi
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987

  - type: web
    name: taxis-trip-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/trip-service/Dockerfile
    dockerContext: ./backend/trip-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: taxis-trips-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: taxis-trips-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: taxis-trips-db
          property: password
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987

