# Render Blueprint gratuito para el backend de Gestion de Taxis.
#
# Recursos gratis usados:
# - 4 Web Services Free en Render: API Gateway + 3 microservicios.
# - 1 Render PostgreSQL Free para auth-service y trip-service.
# - MySQL externo en Aiven Free Tier para taxi-service.
#
# Importante:
# Render no ofrece MySQL administrado gratuito. Para cumplir MySQL + PostgreSQL
# sin pagar, crea MySQL en Aiven Free y pega sus credenciales cuando Render
# pida las variables MYSQL_* marcadas con sync: false.

databases:
  - name: taxis-postgres-db
    plan: free
    databaseName: taxis_postgres
    user: taxis_user
    postgresMajorVersion: "16"

services:
  - type: web
    name: taxis-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist/gestion-taxis-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: taxis-api-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./backend/api-gateway/Dockerfile
    dockerContext: ./backend/api-gateway
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: taxis-auth-service
          property: host
      - key: TAXI_SERVICE_URL
        fromService:
          type: web
          name: taxis-taxi-service
          property: host
      - key: TRIP_SERVICE_URL
        fromService:
          type: web
          name: taxis-trip-service
          property: host

  - type: web
    name: taxis-auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/auth-service/Dockerfile
    dockerContext: ./backend/auth-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: taxis-postgres-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: taxis-postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: taxis-postgres-db
          property: password
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987

  - type: web
    name: taxis-taxi-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/taxi-service/Dockerfile
    dockerContext: ./backend/taxi-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_SSL_MODE
        value: REQUIRED
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987

  - type: web
    name: taxis-trip-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/trip-service/Dockerfile
    dockerContext: ./backend/trip-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: taxis-postgres-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: taxis-postgres-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: taxis-postgres-db
          property: password
      - key: JWT_SECRET
        value: 6b2b8e0ce8d1400d8a03a6e2a1df6c8dbda7e37868529e7f4f9d60b3d5adf987
